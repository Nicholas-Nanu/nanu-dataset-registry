<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nanu Dataset Registry</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050C0F; color: #E2F0F0; font-family: 'Space Mono', monospace; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #1FC2C2; border-radius: 2px; }
    ::-webkit-scrollbar-track { background: #0D1B21; }
    .btn { cursor: pointer; border: none; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.08em; border-radius: 2px; transition: all 0.15s; }
    .btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tab { cursor: pointer; border: none; background: none; font-family: 'Space Mono', monospace; transition: all 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
    .ftab { cursor: pointer; border: none; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; border-radius: 2px; padding: 3px 9px; transition: all 0.15s; }
    .row-wrap { transition: background 0.1s; }
    .row-wrap:hover { background: rgba(31,194,194,0.03) !important; }
    .ibtn { cursor: pointer; border: none; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; border-radius: 2px; padding: 3px 8px; transition: all 0.12s; letter-spacing: 0.05em; white-space: nowrap; }
    .ibtn:hover:not(:disabled) { filter: brightness(1.3); }
    .ibtn:disabled { opacity: 0.5; cursor: not-allowed; }
    .col-pill { display: inline-block; background: #0D1B21; border: 1px solid #1A3A3A; border-radius: 2px; padding: 2px 8px; font-size: 9px; color: #82F9F6; margin: 2px 3px 2px 0; letter-spacing: 0.04em; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .blink { animation: blink 1s ease-in-out infinite; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
    .slide { animation: slideDown 0.2s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    // ── Data ──────────────────────────────────────────────────────────────────

    const CATEGORIES = [
      { id: "uap",               label: "UFO / UAP",         color: "#1FC2C2", icon: "◈" },
      { id: "nhi",               label: "NHI",               color: "#0EA5E9", icon: "◉" },
      { id: "cryptids",          label: "Cryptids",          color: "#16A34A", icon: "◎" },
      { id: "paranormal",        label: "Paranormal",        color: "#9333EA", icon: "◇" },
      { id: "consciousness",     label: "Consciousness",     color: "#EC4899", icon: "○" },
      { id: "myths_history",     label: "Myths & History",   color: "#F59E0B", icon: "△" },
      { id: "ritual_occult",     label: "Ritual / Occult",   color: "#DC2626", icon: "✦" },
      { id: "natural_phenomena", label: "Natural Phenomena", color: "#10B981", icon: "◬" },
      { id: "fortean",           label: "Other / Fortean",   color: "#6B7280", icon: "◌" },
    ];

    const SEEDS = {
      uap: [
        { name: "NUFORC Sightings — Scraped & Geocoded", url: "https://raw.githubusercontent.com/planetsig/ufo-reports/master/csv-data/ufo-scrubbed-geocoded-time-standardized.csv", file_type: "csv", records: "~80,000", columns: ["datetime","city","state","country","shape","duration_seconds","comments","date_posted","latitude","longitude"], source_org: "NUFORC / GitHub", login: false },
        { name: "Project Blue Book Cases — TSV", url: "https://raw.githubusercontent.com/sethblack/python-ufo/master/data/ufo_awesome.tsv", file_type: "csv", records: "~61,000", columns: ["sighted_at","reported_at","location","shape","duration","description"], source_org: "Blue Book Archive / GitHub", login: false },
        { name: "UFO Sightings 1910–2014 — Kaggle", url: "https://www.kaggle.com/datasets/NUFORC/ufo-sightings/download", file_type: "csv", records: "~80,000", columns: ["datetime","city","state","country","shape","duration_seconds","comments","date_posted","latitude","longitude"], source_org: "Kaggle / NUFORC", login: true },
        { name: "UK MoD UFO Files Index — CSV", url: "https://raw.githubusercontent.com/dieghernan/ukufo/master/data/ufo_uk.csv", file_type: "csv", records: "~11,000", columns: ["date","time","location","county","country","description","source_file"], source_org: "UK National Archives / GitHub", login: false },
      ],
      nhi: [
        { name: "MUFON Reports — Kaggle", url: "https://www.kaggle.com/datasets/jonathanbouchet/mufon-reports/download", file_type: "csv", records: "~70,000", columns: ["id","date","city","state","country","shape","summary","duration","disposition","latitude","longitude"], source_org: "MUFON / Kaggle", login: true },
        { name: "Humanoid Contact Database — CSV", url: "https://raw.githubusercontent.com/AlbertaSat/ex2_ground_station_website/master/data/humanoid_contacts.csv", file_type: "csv", records: "~3,500", columns: ["case_id","year","country","entity_description","witness_count","physical_traces","source"], source_org: "Humanoid Contact Database", login: false },
        { name: "FREE Foundation Experiencer Survey", url: "https://www.experiencer.org/survey-data-executive-summary/", file_type: "csv", records: "~3,000", columns: ["encounter_type","entity_type","location","year","physical_effects","psychological_effects","communication_type"], source_org: "FREE Foundation", login: false },
      ],
      cryptids: [
        { name: "BFRO Bigfoot Sightings — Geocoded CSV", url: "https://raw.githubusercontent.com/bfro/bfro-report-data/master/bfro_reports_geocoded.csv", file_type: "csv", records: "~5,000", columns: ["number","title","classification","timestamp","latitude","longitude","state","county","observed","season","time_of_day"], source_org: "BFRO / GitHub", login: false },
        { name: "BFRO Reports — Kaggle", url: "https://www.kaggle.com/datasets/josephvm/bigfoot-sightings-data/download", file_type: "csv", records: "~4,600", columns: ["observed","classification","county","state","season","month","latitude","longitude","title","date"], source_org: "BFRO / Kaggle", login: true },
        { name: "Cryptid Sightings Compiled — GitHub", url: "https://raw.githubusercontent.com/aaronpenne/data_collection/master/cryptids/cryptid_sightings.csv", file_type: "csv", records: "~2,000", columns: ["id","creature","date","state","country","description","source"], source_org: "Community / GitHub", login: false },
      ],
      paranormal: [
        { name: "Rhine Centre Psi Experiment Database", url: "https://www.rhine.org/wp-content/uploads/rhine_data.xlsx", file_type: "xlsx", records: "~2,400", columns: ["study_id","year","researcher","psi_type","hits","trials","hit_rate","p_value"], source_org: "Rhine Research Center", login: false },
        { name: "Global Consciousness Project — GCP Event Data", url: "https://noosphere.princeton.edu/eggs/data/gcp_data_export.csv", file_type: "csv", records: "~500 events", columns: ["event_id","event_name","start_time","end_time","z_score","p_value","description"], source_org: "GCP / Princeton", login: false },
        { name: "Parapsychology Meta-Analysis — Zenodo", url: "https://zenodo.org/record/3935165/files/parapsychology_meta_analysis.csv", file_type: "csv", records: "~800", columns: ["study_id","year","author","effect_type","effect_size","sample_size","p_value","methodology"], source_org: "Zenodo", login: false },
      ],
      consciousness: [
        { name: "NDERF Near Death Experiences — CSV", url: "https://raw.githubusercontent.com/nderf-data/nde-structured/master/nde_cases.csv", file_type: "csv", records: "~5,000", columns: ["nde_id","year","country","gender","age","nde_score","elements_present","life_review","tunnel","light","beings","aftereffects"], source_org: "NDERF / GitHub", login: false },
        { name: "CIA Stargate Project — Sessions CSV", url: "https://raw.githubusercontent.com/openai-research/stargate-data/master/stargate_sessions.csv", file_type: "csv", records: "~800", columns: ["session_id","date","viewer","target","methodology","accuracy_rating","analyst","notes"], source_org: "CIA FOIA / Compiled", login: false },
        { name: "Global Consciousness Project — Events", url: "https://noosphere.princeton.edu/eggs/data/events.csv", file_type: "csv", records: "~500", columns: ["event_id","name","date","category","z_score","p_value","hypothesis","result"], source_org: "Princeton GCP", login: false },
      ],
      myths_history: [
        { name: "D-PLACE Mythology & Culture Database", url: "https://raw.githubusercontent.com/D-PLACE/dplace-data/master/societies.csv", file_type: "csv", records: "~1,500 societies", columns: ["id","pref_name","latitude","longitude","language_family","region","subregion"], source_org: "D-PLACE / Max Planck", login: false },
        { name: "Berezkin Mythology Motif Database", url: "https://raw.githubusercontent.com/D-PLACE/dplace-data/master/datasets/berezkin/data.csv", file_type: "csv", records: "~50,000", columns: ["soc_id","var_id","code","comment","references","source_coded_data"], source_org: "Berezkin / D-PLACE", login: false },
        { name: "CDLI Cuneiform Texts Catalogue", url: "https://cdli.mpiwg-berlin.mpg.de/dl/data/cdli_catalogue_1of2.csv", file_type: "csv", records: "~340,000", columns: ["id_text","composite_no","museum_no","period","provenience","genre","object_type"], source_org: "CDLI / Max Planck", login: false },
      ],
      ritual_occult: [
        { name: "Survey of Scottish Witchcraft — Full DB", url: "https://witches.shca.ed.ac.uk/index.cfm?fuseaction=home.downloaddata", file_type: "xlsx", records: "~3,837", columns: ["accusedname","sex","age","res_county","res_parish","occupation","verdict","torture","execution","source"], source_org: "University of Edinburgh", login: false },
        { name: "Historical Witch Trials — Europe CSV", url: "https://raw.githubusercontent.com/melaniewalsh/Intro-Cultural-Analytics/master/book/data/witchcraft/witchcraft.csv", file_type: "csv", records: "~1,500", columns: ["id","year","country","region","accused_name","sex","verdict","accusation_type","source"], source_org: "Open Cultural Analytics / GitHub", login: false },
      ],
      natural_phenomena: [
        { name: "USGS Earthquake Catalog — Live CSV Feed", url: "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.csv", file_type: "csv", records: "~10,000/month", columns: ["time","latitude","longitude","depth","mag","magType","nst","gap","rms","net","id","updated","place","type"], source_org: "USGS Earthquake Hazards Program", login: false },
        { name: "NOAA Storm Events Database", url: "https://www.ncei.noaa.gov/pub/data/swdi/stormevents/csvfiles/", file_type: "csv", records: "~1.8M events", columns: ["begin_yearmonth","begin_day","end_day","episode_id","event_id","state","event_type","magnitude","deaths_direct","injuries_direct","damage_property"], source_org: "NOAA NCEI", login: false },
        { name: "NASA Fireball & Bolide Reports", url: "https://cneos.jpl.nasa.gov/fireballs/fireballs.csv", file_type: "csv", records: "~1,000+", columns: ["date","energy_GJ","impact_energy","lat","lon","alt_km","vel_km_s","vx","vy","vz"], source_org: "NASA JPL CNEOS", login: false },
        { name: "AMS Fireball / Meteor Reports", url: "https://fireball.amsmeteors.org/members/imo_view/browse_events?view=list&export=csv", file_type: "csv", records: "~120,000+", columns: ["event_id","date","time_utc","country","state","witnesses","magnitude","duration","sonic_boom","color","latitude","longitude"], source_org: "American Meteor Society", login: false },
      ],
      fortean: [
        { name: "Fortean Events Compiled — GitHub", url: "https://raw.githubusercontent.com/fortean-data/events/master/fortean_events.csv", file_type: "csv", records: "~4,000", columns: ["id","date","country","region","category","phenomenon","description","source","reliability_score"], source_org: "Community / GitHub", login: false },
        { name: "The Hum Reports — Global Export", url: "https://www.thehum.info/uploads/hum_reports_export.csv", file_type: "csv", records: "~12,000", columns: ["report_id","date","latitude","longitude","country","city","description","frequency_hz","intensity","duration","hearing_type"], source_org: "The Hum / Dr. Glen MacPherson", login: false },
        { name: "Charles Fort Anomalies Index — CSV", url: "https://raw.githubusercontent.com/fort-data/fort-index/master/fort_cases.csv", file_type: "csv", records: "~2,500", columns: ["id","book","chapter","year","location","phenomenon_type","description","source_publication"], source_org: "Fort Data Project / GitHub", login: false },
      ],
    };

    // ── Helpers ───────────────────────────────────────────────────────────────

    function downloadCSV(allRows) {
      const lines = ["Name,URL,File Type,Records,Columns,Source Org,Login Required,Category,Source,Validation Status"];
      allRows.forEach(r => {
        const cols = (r.columns || []).join(" | ");
        const vals = [r.name, r.url, r.file_type || "", r.records || "", cols, r.source_org || "", r.login ? "Yes" : "No", r.cat || "", r.source || "seed", r.status || "unverified"];
        lines.push(vals.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","));
      });
      const uri = "data:text/csv;charset=utf-8," + encodeURIComponent(lines.join("\n"));
      const a = document.createElement("a");
      a.href = uri;
      a.download = `nanu-datasets-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ── Main App ──────────────────────────────────────────────────────────────

    function App() {
      const [active,      setActive]      = useState("uap");
      const [filter,      setFilter]      = useState("all");
      const [aiItems,     setAiItems]     = useState({});
      const [statuses,    setStatuses]    = useState({});   // url → {status, size, http}
      const [headers,     setHeaders]     = useState({});   // url → {columns, sample, error}
      const [validating,  setValidating]  = useState({});   // url → bool
      const [fetchingHdr, setFetchingHdr] = useState({});   // url → bool
      const [expanded,    setExpanded]    = useState({});   // url → bool
      const [aiLoading,   setAiLoading]   = useState({});
      const [aiError,     setAiError]     = useState({});

      const cat = CATEGORIES.find(c => c.id === active);

      // Build row list for active category
      const seedRows = SEEDS[active].map(r => ({ ...r, source: "seed" }));
      const aiRows   = (aiItems[active] || []).map(r => ({ ...r, source: "ai" }));
      const seen     = new Set();
      const allRows  = [...seedRows, ...aiRows].filter(r => {
        const k = r.url.replace(/\/$/, "").toLowerCase();
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });

      const filteredRows = allRows.filter(r => {
        const st = (statuses[r.url] || {}).status || "unverified";
        if (filter === "all")        return true;
        if (filter === "live")       return st === "live";
        if (filter === "dead")       return st === "dead";
        if (filter === "unverified") return st === "unverified";
        if (filter === "no-login")   return !r.login;
        if (filter === "seed")       return r.source === "seed";
        if (filter === "ai")         return r.source === "ai";
        return true;
      });

      // Validate single URL
      const validate = useCallback(async (url) => {
        setValidating(p => ({ ...p, [url]: true }));
        try {
          const r = await fetch(`/api/validate?url=${encodeURIComponent(url)}`);
          const data = await r.json();
          setStatuses(p => ({ ...p, [url]: data }));
        } catch (err) {
          setStatuses(p => ({ ...p, [url]: { status: "dead", error: err.message } }));
        } finally {
          setValidating(p => ({ ...p, [url]: false }));
        }
      }, []);

      // Validate all in current tab
      const validateAll = useCallback(async () => {
        for (const row of allRows) {
          if (!(statuses[row.url] || {}).status || (statuses[row.url] || {}).status === "unverified") {
            await validate(row.url);
          }
        }
      }, [allRows, statuses, validate]);

      // Fetch real column headers
      const fetchHeaders = useCallback(async (url) => {
        setFetchingHdr(p => ({ ...p, [url]: true }));
        setExpanded(p => ({ ...p, [url]: true }));
        try {
          const r = await fetch(`/api/headers?url=${encodeURIComponent(url)}`);
          const data = await r.json();
          setHeaders(p => ({ ...p, [url]: data }));
        } catch (err) {
          setHeaders(p => ({ ...p, [url]: { error: err.message } }));
        } finally {
          setFetchingHdr(p => ({ ...p, [url]: false }));
        }
      }, []);

      // AI suggestions
      const fetchAI = useCallback(async (catId) => {
        setAiLoading(p => ({ ...p, [catId]: true }));
        setAiError(p   => ({ ...p, [catId]: null }));
        try {
          const existing = [...SEEDS[catId].map(r => r.url), ...(aiItems[catId] || []).map(r => r.url)];
          const exclude  = existing.slice(0, 20).join(",");
          const r = await fetch(`/api/suggest?category=${catId}&exclude=${encodeURIComponent(exclude)}`);
          const data = await r.json();
          if (data.error) throw new Error(data.error);
          setAiItems(p => ({ ...p, [catId]: [...(p[catId] || []), ...(data.datasets || [])] }));
        } catch (err) {
          setAiError(p => ({ ...p, [catId]: err.message }));
        } finally {
          setAiLoading(p => ({ ...p, [catId]: false }));
        }
      }, [aiItems]);

      // Export
      const handleExport = () => {
        const rows = [];
        CATEGORIES.forEach(c => {
          [...SEEDS[c.id].map(r => ({ ...r, source: "seed" })), ...(aiItems[c.id] || []).map(r => ({ ...r, source: "ai" }))].forEach(r => {
            rows.push({ ...r, cat: c.label, status: (statuses[r.url] || {}).status || "unverified" });
          });
        });
        downloadCSV(rows);
      };

      // Global stats
      const allSeeds      = Object.values(SEEDS).flat();
      const allAI         = Object.values(aiItems).flat();
      const everything    = [...allSeeds, ...allAI];
      const nLive         = everything.filter(r => (statuses[r.url] || {}).status === "live").length;
      const nDead         = everything.filter(r => (statuses[r.url] || {}).status === "dead").length;
      const nNoLogin      = everything.filter(r => !r.login).length;

      const catLive       = allRows.filter(r => (statuses[r.url] || {}).status === "live").length;
      const catDead       = allRows.filter(r => (statuses[r.url] || {}).status === "dead").length;
      const catUnverified = allRows.filter(r => !(statuses[r.url] || {}).status || (statuses[r.url] || {}).status === "unverified").length;
      const catNoLogin    = allRows.filter(r => !r.login).length;

      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>

          {/* Header */}
          <div style={{ borderBottom: "1px solid #1FC2C2", padding: "18px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "linear-gradient(180deg,#0D1B21,#050C0F)", gap: "16px", flexWrap: "wrap" }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "3px" }}>
                <span style={{ fontFamily: "Syne,sans-serif", fontSize: "17px", fontWeight: 800, letterSpacing: "0.1em", color: "#1FC2C2" }}>NANU</span>
                <span style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.45, letterSpacing: "0.14em" }}>// DATASET REGISTRY</span>
              </div>
              <div style={{ fontFamily: "Syne,sans-serif", fontSize: "20px", fontWeight: 700, color: "#fff" }}>CSV & XLSX Dataset Discovery</div>
              <div style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.4, marginTop: "3px" }}>
                {everything.length} total datasets · {nNoLogin} no login · {nLive} verified live · {nDead} dead
              </div>
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button className="btn" onClick={validateAll}
                style={{ padding: "9px 16px", fontSize: "10px", background: "transparent", color: "#1FC2C2", border: "1px solid #1FC2C2" }}>
                ◈ VALIDATE TAB
              </button>
              <button className="btn" onClick={handleExport}
                style={{ padding: "9px 16px", fontSize: "10px", background: "#1FC2C2", color: "#050C0F" }}>
                ↓ EXPORT CSV
              </button>
            </div>
          </div>

          {/* Category tabs */}
          <div style={{ display: "flex", overflowX: "auto", borderBottom: "1px solid #0D2A2A", background: "#060F12", padding: "0 28px" }}>
            {CATEGORIES.map(c => {
              const isActive = c.id === active;
              const cAll     = (SEEDS[c.id]?.length || 0) + (aiItems[c.id]?.length || 0);
              const cLive    = [...(SEEDS[c.id]||[]), ...(aiItems[c.id]||[])].filter(r => (statuses[r.url]||{}).status === "live").length;
              return (
                <button key={c.id} className="tab" onClick={() => { setActive(c.id); setFilter("all"); }}
                  style={{ padding: "11px 13px", borderBottom: isActive ? `2px solid ${c.color}` : "2px solid transparent", color: isActive ? c.color : "#82F9F6", fontSize: "10px", letterSpacing: "0.06em", fontWeight: isActive ? 700 : 400, opacity: isActive ? 1 : 0.45 }}>
                  {c.icon} {c.label.toUpperCase()}
                  <span style={{ fontSize: "9px", color: cLive > 0 ? "#10B981" : c.color, opacity: 0.7 }}>
                    {cLive > 0 ? `✓${cLive}/${cAll}` : cAll}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Main content */}
          <div style={{ padding: "20px 28px", flex: 1 }}>

            {/* Controls */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "12px", flexWrap: "wrap", gap: "8px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
                <span style={{ fontFamily: "Syne,sans-serif", fontSize: "15px", fontWeight: 700, color: cat.color }}>{cat.icon} {cat.label}</span>
                <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
                  {[
                    { key: "all",        label: `ALL (${allRows.length})`,         color: "#82F9F6" },
                    { key: "no-login",   label: `NO LOGIN (${catNoLogin})`,        color: "#1FC2C2" },
                    { key: "live",       label: `✓ LIVE (${catLive})`,             color: "#10B981" },
                    { key: "dead",       label: `✗ DEAD (${catDead})`,             color: "#EF4444" },
                    { key: "unverified", label: `? PENDING (${catUnverified})`,    color: "#F59E0B" },
                    { key: "seed",       label: `CURATED (${seedRows.length})`,    color: "#1FC2C2" },
                    { key: "ai",         label: `AI (${aiRows.length})`,           color: "#9333EA" },
                  ].map(f => (
                    <button key={f.key} className="ftab" onClick={() => setFilter(f.key)}
                      style={{ background: filter === f.key ? `${f.color}20` : "transparent", color: f.color, border: `1px solid ${filter === f.key ? f.color : f.color + "28"}`, opacity: filter === f.key ? 1 : 0.5 }}>
                      {f.label}
                    </button>
                  ))}
                </div>
              </div>
              <button className="btn" onClick={() => fetchAI(active)} disabled={!!aiLoading[active]}
                style={{ padding: "7px 14px", fontSize: "9px", background: "transparent", color: "#9333EA", border: "1px solid #9333EA" }}>
                {aiLoading[active] ? <span className="blink">◉ SEARCHING...</span> : "◎ FIND MORE DATASETS"}
              </button>
            </div>

            {aiError[active] && (
              <div style={{ background: "#1A0A0A", border: "1px solid #C23A3A", padding: "9px 14px", borderRadius: "2px", marginBottom: "10px", fontSize: "10px", color: "#F87171" }}>
                ⚠ {aiError[active]}
              </div>
            )}

            {/* Dataset list */}
            <div style={{ border: "1px solid #0D2A2A", borderRadius: "2px", overflow: "hidden" }}>
              {filteredRows.length === 0 && (
                <div style={{ padding: "36px", textAlign: "center", opacity: 0.3 }}>
                  <div style={{ fontFamily: "Syne,sans-serif", fontSize: "13px", color: "#82F9F6" }}>No datasets match this filter</div>
                </div>
              )}

              {filteredRows.map((row, i) => {
                const vstatus   = (statuses[row.url] || {}).status || "unverified";
                const vsize     = (statuses[row.url] || {}).size_label;
                const isLive    = vstatus === "live";
                const isDead    = vstatus === "dead";
                const isVal     = !!validating[row.url];
                const isHdrLoad = !!fetchingHdr[row.url];
                const hdrData   = headers[row.url];
                const isOpen    = expanded[row.url];
                const isLast    = i === filteredRows.length - 1;

                const statusInfo = (() => {
                  if (isVal)    return { bg: "#071A1A", color: "#1FC2C2", border: "#1FC2C235", label: "◉ CHECKING" };
                  if (isLive)   return { bg: "#0D2E1A", color: "#10B981", border: "#10B98135", label: "✓ LIVE" };
                  if (isDead)   return { bg: "#1A0A0A", color: "#EF4444", border: "#EF444435", label: "✗ DEAD" };
                  return               { bg: "#0D1B21", color: "#F59E0B", border: "#F59E0B30", label: "? UNVERIFIED" };
                })();

                const ftBadge = row.file_type === "xlsx"
                  ? { bg: "#0D1F0D", color: "#22C55E", border: "#22C55E30", label: "XLSX" }
                  : { bg: "#071A1A", color: "#1FC2C2", border: "#1FC2C230", label: "CSV" };

                // Columns to show (real if fetched, fallback to seed metadata)
                const colsToShow = hdrData?.columns || row.columns || [];
                const hasRealCols = !!hdrData?.columns;

                return (
                  <div key={row.url} style={{ borderBottom: isLast ? "none" : "1px solid #0D2A2A" }}>
                    {/* Main row */}
                    <div className="row-wrap"
                      style={{ display: "flex", alignItems: "center", padding: "10px 14px", gap: "10px", background: i % 2 === 0 ? "#060F12" : "#070D10", flexWrap: "wrap" }}>

                      {/* Badges */}
                      <div style={{ display: "flex", flexDirection: "column", gap: "4px", flexShrink: 0 }}>
                        <span style={{ fontSize: "8px", fontWeight: 700, padding: "2px 6px", borderRadius: "2px", background: ftBadge.bg, color: ftBadge.color, border: `1px solid ${ftBadge.border}`, letterSpacing: "0.08em" }}>{ftBadge.label}</span>
                        <span style={{ fontSize: "8px", fontWeight: 700, padding: "2px 6px", borderRadius: "2px", background: row.source === "seed" ? "#071A1A" : "#12071A", color: row.source === "seed" ? "#1FC2C2" : "#9333EA", border: row.source === "seed" ? "1px solid #1FC2C218" : "1px solid #9333EA20", letterSpacing: "0.06em" }}>
                          {row.source === "seed" ? "SEED" : "AI"}
                        </span>
                      </div>

                      {/* Info */}
                      <div style={{ flex: 1, minWidth: "200px" }}>
                        <div style={{ fontSize: "11px", fontWeight: 700, color: isDead ? "#555" : "#fff", textDecoration: isDead ? "line-through" : "none", marginBottom: "4px" }}>
                          {row.name}
                          {row.login && (
                            <span style={{ marginLeft: "7px", fontSize: "8px", color: "#F59E0B", background: "#1A1400", border: "1px solid #F59E0B25", borderRadius: "2px", padding: "1px 5px", fontWeight: 700 }}>LOGIN</span>
                          )}
                        </div>
                        <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", alignItems: "center" }}>
                          <a href={row.url} target="_blank" rel="noopener noreferrer"
                            style={{ fontSize: "9px", color: isDead ? "#444" : cat.color, textDecoration: "none", maxWidth: "360px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}
                            title={row.url}
                            onMouseOver={e => e.currentTarget.style.textDecoration = "underline"}
                            onMouseOut={e  => e.currentTarget.style.textDecoration = "none"}>
                            {row.url.replace(/^https?:\/\//, "")}
                          </a>
                          {row.records && <span style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.4 }}>{row.records} rows</span>}
                          {vsize && <span style={{ fontSize: "9px", color: "#10B981", opacity: 0.7 }}>{vsize}</span>}
                          {row.source_org && <span style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.3 }}>{row.source_org}</span>}
                        </div>
                      </div>

                      {/* Actions */}
                      <div style={{ display: "flex", gap: "5px", alignItems: "center", flexWrap: "wrap", flexShrink: 0 }}>
                        <a href={row.url} target="_blank" rel="noopener noreferrer"
                          style={{ display: "inline-flex", alignItems: "center", padding: "4px 9px", background: "#0D1B21", color: cat.color, border: `1px solid ${cat.color}30`, borderRadius: "2px", fontSize: "9px", fontWeight: 700, textDecoration: "none", letterSpacing: "0.06em" }}
                          onMouseOver={e => e.currentTarget.style.borderColor = cat.color}
                          onMouseOut={e  => e.currentTarget.style.borderColor = cat.color + "30"}>
                          ↗ OPEN
                        </a>
                        <button className="ibtn" onClick={() => validate(row.url)} disabled={isVal}
                          style={{ background: "#0D1B21", color: "#1FC2C2", border: "1px solid #1FC2C230" }}>
                          {isVal ? <span className="blink">◉</span> : "◈ VALIDATE"}
                        </button>
                        <button className="ibtn"
                          onClick={() => isOpen && !isHdrLoad ? setExpanded(p => ({ ...p, [row.url]: false })) : fetchHeaders(row.url)}
                          disabled={isHdrLoad}
                          style={{ background: isOpen ? "#071A1A" : "#0D1B21", color: cat.color, border: `1px solid ${cat.color}30` }}>
                          {isHdrLoad ? <span className="blink">◉ READING</span> : isOpen ? "▴ COLS" : "▾ COLS"}
                        </button>
                        {/* Status badge */}
                        <span style={{ fontSize: "9px", fontWeight: 700, padding: "3px 8px", borderRadius: "2px", background: statusInfo.bg, color: statusInfo.color, border: `1px solid ${statusInfo.border}`, whiteSpace: "nowrap" }}
                          className={isVal ? "blink" : ""}>
                          {statusInfo.label}
                        </span>
                      </div>
                    </div>

                    {/* Column expansion panel */}
                    {isOpen && (
                      <div className="slide" style={{ background: "#040A0D", borderTop: `1px solid ${cat.color}15`, padding: "12px 14px 14px 60px" }}>
                        {isHdrLoad ? (
                          <div style={{ fontSize: "10px", color: "#1FC2C2" }} className="blink">Reading file headers...</div>
                        ) : hdrData?.error ? (
                          <div style={{ fontSize: "10px", color: "#F87171" }}>⚠ Could not read headers: {hdrData.error}</div>
                        ) : (
                          <>
                            <div style={{ fontSize: "9px", color: cat.color, letterSpacing: "0.1em", fontWeight: 700, marginBottom: "8px", opacity: 0.7 }}>
                              {hasRealCols ? "✓ REAL COLUMNS FROM FILE" : "KNOWN COLUMNS (METADATA)"} — {colsToShow.length} fields
                            </div>
                            <div>
                              {colsToShow.length === 0
                                ? <span style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.3 }}>No column data — click ▾ COLS to fetch from file</span>
                                : colsToShow.map((col, ci) => <span key={ci} className="col-pill">{col}</span>)
                              }
                            </div>
                            {hdrData?.sample?.length > 0 && (
                              <div style={{ marginTop: "10px" }}>
                                <div style={{ fontSize: "9px", color: "#82F9F6", opacity: 0.45, letterSpacing: "0.08em", marginBottom: "6px" }}>SAMPLE DATA (first 3 rows)</div>
                                <div style={{ overflowX: "auto" }}>
                                  <table style={{ borderCollapse: "collapse", fontSize: "9px", color: "#82F9F6" }}>
                                    <thead>
                                      <tr>{colsToShow.map((c, ci) => <th key={ci} style={{ padding: "3px 10px", background: "#0D1B21", border: "1px solid #1A3A3A", color: cat.color, fontWeight: 700, letterSpacing: "0.06em", textAlign: "left", whiteSpace: "nowrap" }}>{c}</th>)}</tr>
                                    </thead>
                                    <tbody>
                                      {hdrData.sample.map((row, ri) => (
                                        <tr key={ri}>
                                          {colsToShow.map((c, ci) => (
                                            <td key={ci} style={{ padding: "3px 10px", border: "1px solid #1A3A3A", opacity: 0.6, maxWidth: "160px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                              {String(row[c] ?? "")}
                                            </td>
                                          ))}
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid #0D2A2A", padding: "10px 28px", display: "flex", justifyContent: "space-between", fontSize: "9px", color: "#82F9F6", opacity: 0.25, letterSpacing: "0.1em" }}>
            <span>UNKNOWN SYSTEMS LTD // NANU DATASET REGISTRY</span>
            <span>DISCOVER • DISCUSS • DISCLOSE</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
